# Document metadata manifest
# -----------------------------------------------------------------------------
# The source documents (PDFs) live in Google Drive and carry no machine-readable
# version/date. This manifest attaches that metadata at ingest time so the RAG
# pipeline can produce version-aware citations (Selva's requirement: surface the
# document name + last-updated date, and flag if a newer version exists).
#
# Matching is by filename, normalized (lowercase, alphanumeric only), so minor
# punctuation/spacing differences between Drive and the local cache don't matter.
#
# When Selva sends a new or updated document, add/update its entry here — no code
# change needed.

